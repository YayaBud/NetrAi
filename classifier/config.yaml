# =============================================================================
# NetrAi Classifier — Master Configuration
# =============================================================================
# Classes: 0=DR, 1=Glaucoma, 2=PM (Pathologic Myopia)

paths:
  # Root directory containing class-organised image folders
  data_dir:           "data/classifier"
  # Directory of per-image clean residual anomaly maps from the diffusion model
  # Each map must be named  <image_stem>_anomaly.png  (greyscale or hot-cmap PNG)
  anomaly_maps_dir:   "data/anomaly_maps"
  # Output directories
  checkpoint_dir:     "checkpoints/classifier"
  features_dir:       "features"
  retfound_cache_dir: "retfound_cache"
  # Path to local RETFound-cfp weights (.pth checkpoint)
  # Leave null to fall back to ViT-L/16 ImageNet weights (not recommended)
  retfound_weights:   null

data:
  image_size: 512
  # ImageNet normalisation (matches MIT-B3 pretraining AND RETFound)
  mean: [0.485, 0.456, 0.406]
  std:  [0.229, 0.224, 0.225]
  num_workers: 4
  pin_memory: true

model:
  backbone: "nvidia/mit-b3"
  # Channel count each encoder stage projects to in the decode head
  decoder_embed_dim: 256          # 4 × 256 = 1024 → F_concat channels
  # Dual-path output dimensions
  path_a_dim: 384
  path_b_dim: 384                 # equals mu dimension
  # Learned gate scalar α initialisation
  alpha_init: 1.0
  # Final vector: 384 + 384 + 1 = 769
  # XGBoost input:  769 + 1024   = 1793

training:
  epochs: 100
  batch_size: 16
  lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 5
  grad_clip: 1.0
  amp: true                       # mixed-precision (bfloat16 on Ampere+)

  # ---------- Loss weights ----------
  supcon_weight: 1.0
  lambda_kl:     1.0              # pass-through — β (via BetaScheduler) is the sole VIB knob
  lambda_ortho:  0.1

  # ---------- SupCon temperatures (per class) ----------
  # Lower = sharper gradient = more attention on hard negatives
  supcon_temperatures:
    0: 0.07   # DR
    1: 0.07   # Glaucoma
    2: 0.04   # PM (minority → sharper penalty)
  supcon_base_temperature: 0.07

  # ---------- VIB β-annealing ----------
  beta_warmup_epochs:  10         # β = 0 for first N epochs
  beta_anneal_epochs:  20         # linear ramp after warmup
  beta_target:         0.001      # final β value

  # ---------- Checkpointing ----------
  save_every: 5                   # save checkpoint every N epochs
  eval_every: 1

retfound:
  embed_dim: 1024
  image_size: 224                 # RETFound expects 224×224
  # How many images to process per GPU batch during pre-computation
  cache_batch_size: 32

xgboost:
  # Feature vector: 1793-D  (769 SegFormer + 1024 RETFound)
  n_estimators:        1000
  max_depth:           6
  learning_rate:       0.05
  subsample:           0.8
  colsample_bytree:    0.8
  min_child_weight:    3
  gamma:               0.1
  reg_alpha:           0.1        # L1
  reg_lambda:          1.0        # L2
  objective:           "multi:softprob"
  num_class:           3
  eval_metric:         "mlogloss"
  early_stopping_rounds: 50
  seed:                42
  device:              "cuda"     # or "cpu"
  tree_method:         "hist"     # required for reliable GPU tree building
  n_jobs:              -1

classes:
  names: ["DR", "Glaucoma", "PM"]
  DR:       0
  Glaucoma: 1
  PM:       2
